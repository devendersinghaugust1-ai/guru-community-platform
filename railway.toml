[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install && npm run build && cp -r dist ../backend/static && cd ../backend && pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
